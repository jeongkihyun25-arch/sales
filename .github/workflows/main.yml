name: Sales Data Hourly Update

# 💡 스케줄(cron)을 삭제하여 GAS 리모컨 신호에만 반응하도록 설정함
on:
  workflow_dispatch: 

# 최신 Node.js 환경 사용 및 쓰기 권한 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 및 업데이트 실행
        env:
          WOS_ID: ${{ secrets.WOS_ID }}
          WOS_PW: ${{ secrets.WOS_PW }}
        run: python main.py

      - name: 변경사항 깃허브에 반영
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "GAS 리모컨 신호에 의해 자동 업데이트 완료"
          file_pattern: 'current_sales.xlsx'
