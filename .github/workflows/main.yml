name: Sales Data Hourly Update

on:
  schedule:
    # 월-금, 한국시간 09:10 ~ 20:10 (매시간 10분 실행)
    - cron: '10 0-11 * * 1-5'
  workflow_dispatch: 

# 💡 최신 Node.js 24 환경을 강제로 사용하여 경고를 제거합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 403 에러 방지를 위한 필수 쓰기 권한
permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 및 업데이트 실행
        env:
          WOS_ID: ${{ secrets.WOS_ID }}
          WOS_PW: ${{ secrets.WOS_PW }}
        run: python main.py

      - name: 변경사항 깃허브에 반영
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "매시간 자동 업데이트 완료 (Node 24 적용)"
          file_pattern: 'current_sales.xlsx'
