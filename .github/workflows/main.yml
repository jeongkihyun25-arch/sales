name: Hourly Sales Update

on:
  schedule:
    # 월-금, 한국시간 09:10 ~ 20:10까지 매시간 10분에 실행
    - cron: '10 0-11 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python Script
        env:
          WOS_ID: ${{ secrets.WOS_ID }}
          WOS_PW: ${{ secrets.WOS_PW }}
        run: python main.py 

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5 
        with:
          commit_message: "실적 데이터 자동 업데이트 완료"
