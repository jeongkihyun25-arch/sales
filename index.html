<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSTK 세일즈 통합 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); transition: transform 0.2s; }
        .table-scroll { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .type-active { background-color: #0f172a; color: white; border-color: #0f172a; }
        .type-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
        .tooltip-text { transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100; word-break: keep-all; line-height: 1.4; pointer-events: none; }
        @media (hover: hover) {
            .group:hover .tooltip-text { opacity: 1; transform: translateY(0) translateX(-50%); }
            .group:hover .tooltip-text.align-right { transform: translateY(0) translateX(0); }
        }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background-color: #f8fafc; }
        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden selection:bg-red-100">

    <div id="loader" class="loading-overlay">
        <div class="w-10 h-10 border-4 border-slate-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-slate-500 text-sm">데이터를 분석 중입니다...</p>
    </div>

    <header class="sticky top-0 z-50 glass-header">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-[#E30613] to-[#B0000A] text-white font-black px-2 py-1 rounded-lg text-[10px] italic shadow-md">BSTK</div>
                <div class="flex bg-slate-100 p-0.5 rounded-lg">
                    <button onclick="changeType('ALL')" id="type-ALL" class="type-active px-3 py-1 rounded-md text-[11px] font-bold">전체</button>
                    <button onclick="changeType('PSR')" id="type-PSR" class="type-inactive px-3 py-1 rounded-md text-[11px] font-bold">PCR</button>
                    <button onclick="changeType('TBR')" id="type-TBR" class="type-inactive px-3 py-1 rounded-md text-[11px] font-bold">TBR</button>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select id="mtp-select" onchange="render()" class="border border-slate-200 rounded-lg px-2 py-1.5 text-[11px] font-bold bg-white max-w-[85px] md:max-w-none shadow-sm outline-none"></select>
                <select id="month-select" onchange="render()" class="border border-slate-200 rounded-lg px-2 py-1.5 text-[11px] font-bold bg-white shadow-sm outline-none"></select>
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto px-4 py-5 hidden">
        <div class="flex justify-between items-end mb-4">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sales Performance Dashboard</span>
                <h2 class="text-lg font-black text-slate-800">통합 실적 현황</h2>
            </div>
            <div id="update-time" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md">동기화 대기</div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-5 mb-6 md:mb-10 text-left">
            <div class="bg-white p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] card-shadow border border-slate-100 flex flex-col justify-between">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-500 uppercase tracking-wide">올해 누적 (YTD)</p>
                <div class="flex items-baseline gap-1 mt-1"><span id="ytd-val" class="text-2xl md:text-5xl font-black text-slate-800">0</span><span class="text-slate-400 font-bold text-xs">본</span></div>
                <div id="ytd-yoy-badge" class="mt-2 inline-block px-2 py-0.5 rounded-md text-[9px] font-black self-start">계산중</div>
            </div>
            <div class="bg-white p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] card-shadow border border-slate-100 flex flex-col justify-between">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-500 uppercase tracking-wide">작년 동기 누적</p>
                <div class="flex items-baseline gap-1 mt-1 text-slate-400"><span id="ly-ytd-val" class="text-2xl md:text-5xl font-black">0</span><span class="text-slate-300 font-bold text-xs">본</span></div>
                <p class="text-[9px] text-slate-400 mt-2">전년 동일 비중 보정</p>
            </div>
            <div class="bg-slate-800 p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] text-white card-shadow flex flex-col justify-between">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-300 uppercase tracking-widest">동기간 도달률</p>
                <div id="attainment-ytd-pct" class="text-3xl md:text-5xl font-black text-emerald-400">0%</div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden mt-2"><div id="attainment-ytd-bar" class="bg-emerald-400 h-full w-0 transition-all duration-1000"></div></div>
                <p class="text-[8px] text-slate-500 mt-2">5년평균 누적(<span id="target-ytd-val">0</span>) 기준</p>
            </div>
            <div class="bg-slate-900 p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] text-white card-shadow flex flex-col justify-between border-t-2 border-indigo-500">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-300 uppercase tracking-widest">연간 총 달성률</p>
                <div id="attainment-total-pct" class="text-3xl md:text-5xl font-black text-indigo-400">0%</div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mt-2"><div id="attainment-total-bar" class="bg-indigo-400 h-full w-0 transition-all duration-1000"></div></div>
                <p class="text-[8px] text-slate-500 mt-2">5년평균 연간(<span id="target-total-val">0</span>) 기준</p>
            </div>
        </div>

        <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden flex flex-col">
            <div class="px-4 md:px-8 py-4 md:py-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 text-left">
                <div class="flex items-center gap-2">
                    <h3 class="font-black text-slate-800 text-sm md:text-lg">거래처별 실적 분석</h3>
                    <span id="row-count" class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[10px] font-bold uppercase tracking-wide">0 DEALERS</span>
                </div>
                <input id="search-input" oninput="render()" type="text" placeholder="대리점명 또는 초성 검색" class="w-full md:w-80 border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold bg-slate-50 outline-none focus:bg-white transition-all shadow-inner">
            </div>
            <div class="overflow-x-auto table-scroll">
                <table class="w-full text-left whitespace-nowrap min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-50/80 text-[9px] md:text-[10px] font-black text-slate-500 uppercase border-b border-slate-200">
                            <th class="px-6 py-4 sticky left-0 bg-slate-50 z-30 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">딜러명</th>
                            <th class="sortable px-4 py-4 text-right group relative" onclick="setSort('ly_ytd')">
                                작년 동기 누적 <span id="sort-icon-ly_ytd"></span>
                            </th>
                            <th class="sortable px-4 py-4 text-right bg-red-50/30 text-red-900 border-l group relative" onclick="setSort('ytd')">
                                올해 누계(YTD) <span id="sort-icon-ytd">▼</span>
                            </th>
                            <th class="sortable px-4 py-4 text-right group relative" onclick="setSort('atot')">
                                5년 평균 1년 <span id="sort-icon-atot"></span>
                            </th>
                            <th class="sortable px-4 py-4 text-right group relative" onclick="setSort('aytd')">
                                5년 평균 누적 <span id="sort-icon-aytd"></span>
                            </th>
                            <th class="px-4 py-4 text-right">연간 달성률</th>
                            <th class="px-4 py-4 text-right">동기간 도달률</th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-100 text-[11px] md:text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "sales";
        let fullData = [], currentType = 'ALL', selectedMonth = new Date().getMonth() + 1;
        let sortCol = 'ytd', sortDesc = true;

        async function init() {
            const t = new Date().getTime();
            // 💡 뼈대파일(Historical)과 방금 확인하신 원본실적파일(Current)을 동시에 가져옵니다.
            const histUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`;
            const currUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xlsx?t=${t}`;
            
            try {
                const [histRes, currRes] = await Promise.all([fetch(histUrl), fetch(currUrl)]);
                
                const histWb = XLSX.read(new Uint8Array(await histRes.arrayBuffer()), {type: 'array'});
                const currWb = XLSX.read(new Uint8Array(await currRes.arrayBuffer()), {type: 'array'});
                
                const histRows = XLSX.utils.sheet_to_json(histWb.Sheets[histWb.SheetNames[0]], {header: 1});
                const currRows = XLSX.utils.sheet_to_json(currWb.Sheets[currWb.SheetNames[0]], {header: 1});
                
                processData(histRows, currRows);
                
                const now = new Date();
                document.getElementById('update-time').innerText = `최근 동기화: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
            } catch (e) {
                alert("데이터를 불러오는 중 문제가 발생했습니다. Actions 로봇이 성공했는지 확인해주세요.");
                console.error(e);
            }
        }

        function processData(histRows, currRows) {
            if (!histRows || !currRows || histRows.length < 1 || currRows.length < 1) return;

            // 💡 1. WOS 파일(Current)에서 헤더 찾기
            let cHeadIdx = 0;
            for(let i=0; i<Math.min(10, currRows.length); i++) {
                const rowStr = currRows[i].map(v=>String(v||'')).join('');
                if(rowStr.includes('거래처') && rowStr.includes('SIZE')) {
                    cHeadIdx = i;
                    break;
                }
            }

            const cHeader = currRows[cHeadIdx].map(v => String(v || '').trim());
            const cIdx = { 
                dealer: cHeader.indexOf('거래처'), 
                size: cHeader.indexOf('SIZE'), 
                pttn: cHeader.indexOf('PTTN'),
                total: cHeader.indexOf('합계수량') // 💡 합계수량 컬럼 직행!
            };
            
            // 혹시 합계수량이 없으면 흩어진 QTY라도 긁어모으는 예비망
            const qtyIndices = cHeader.map((h, i) => h.includes('QTY') ? i : -1).filter(i => i !== -1);

            const currMap = {};
            // 💡 초강력 매핑: 띄어쓰기, 슬래시(/), 괄호(), '주' 글자를 싹 날리고 대문자로 통일
            const cleanStr = str => String(str || '').replace(/[\s\/\(\)주]/g, '').toUpperCase();

            // 진짜 데이터 행부터 읽기 시작
            for (let i = cHeadIdx + 1; i < currRows.length; i++) {
                const r = currRows[i];
                if (!r || !r[cIdx.dealer]) continue;
                
                const key = cleanStr(r[cIdx.dealer]) + cleanStr(r[cIdx.size]) + cleanStr(r[cIdx.pttn]);
                let totalQty = 0;
                
                // 합계수량 칸이 있으면 그대로 쓰고, 없으면 QTY를 다 더함
                if (cIdx.total !== -1 && r[cIdx.total]) {
                    totalQty = parseFloat(String(r[cIdx.total]).replace(/,/g, '')) || 0;
                } else {
                    qtyIndices.forEach(idx => { 
                        totalQty += parseFloat(String(r[idx] || '').replace(/,/g, '')) || 0; 
                    });
                }
                
                currMap[key] = (currMap[key] || 0) + totalQty;
            }

            // 💡 2. 뼈대 파일(Historical)에서 헤더 찾기
            let hHeadIdx = 0;
            for(let i=0; i<Math.min(10, histRows.length); i++) {
                const rowStr = histRows[i].map(v=>String(v||'')).join('');
                if(rowStr.includes('거래처명') && rowStr.includes('사이즈')) {
                    hHeadIdx = i;
                    break;
                }
            }

            const h = histRows[hHeadIdx].map(v => String(v || '').trim());
            const idx = {
                dealer: h.indexOf('거래처명'), type: h.indexOf('품목분류'), mtp: h.indexOf('MTP분류'),
                size: h.indexOf('사이즈'), pttn: h.indexOf('패턴명'),
                y25: h.indexOf('2025년'), atot: h.indexOf('5년평균(연간)')
            };
            const mIdx = {}; for(let m=1; m<=12; m++) mIdx[m] = h.indexOf(`${m}월(5년평균)`);

            // 뼈대에 실적 끼워넣기
            fullData = histRows.slice(hHeadIdx + 1).filter(r => r && r[idx.dealer]).map(r => {
                const histKey = cleanStr(r[idx.dealer]) + cleanStr(r[idx.size]) + cleanStr(r[idx.pttn]);
                const actualYtd = currMap[histKey] || 0; 

                const mAvg = {}; for(let m=1; m<=12; m++) mAvg[m] = Math.max(0, parseFloat(r[mIdx[m]]) || 0);
                
                return {
                    dealer: String(r[idx.dealer]), type: String(r[idx.type]), mtp: String(r[idx.mtp]),
                    ytd: actualYtd, 
                    ly_total: Math.max(0, parseFloat(r[idx.y25]) || 0),
                    atot: Math.max(0, parseFloat(r[idx.atot]) || 0), mAvg: mAvg
                };
            });

            const mtps = [...new Set(fullData.map(d => d.mtp))].sort();
            document.getElementById('mtp-select').innerHTML = '<option value="ALL">전체 MTP</option>' + mtps.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('month-select').innerHTML = Array.from({length:12}, (_,i)=> `<option value="${i+1}" ${i+1===selectedMonth?'selected':''}>${i+1}월 마감 기준</option>`).join('');
            render();
        }

        function changeType(t) {
            currentType = t;
            ['ALL', 'PSR', 'TBR'].forEach(id => document.getElementById('type-'+id).className = id===t?'type-active px-3 py-1 rounded-md text-[11px] font-bold transition-all':'type-inactive px-3 py-1 rounded-md text-[11px] font-bold transition-all');
            render();
        }

        function setSort(col) {
            if (sortCol === col) sortDesc = !sortDesc;
            else { sortCol = col; sortDesc = true; }
            render();
        }

        function render() {
            selectedMonth = parseInt(document.getElementById('month-select').value);
            const selectedMtp = document.getElementById('mtp-select').value;
            const search = document.getElementById('search-input').value.toLowerCase();

            ['ly_ytd', 'ytd', 'atot', 'aytd'].forEach(c => {
                const el = document.getElementById(`sort-icon-${c}`);
                if(el) el.innerText = sortCol === c ? (sortDesc ? '▼' : '▲') : '';
            });

            let filtered = fullData;
            if (currentType !== 'ALL') filtered = filtered.filter(d => d.type === currentType);
            if (selectedMtp !== 'ALL') filtered = filtered.filter(d => d.mtp === selectedMtp);

            const dMap = {};
            filtered.forEach(r => {
                if(!dMap[r.dealer]) dMap[r.dealer] = { ytd:0, ly_ytd:0, atot:0, aytd:0 };
                dMap[r.dealer].ytd += r.ytd;
                dMap[r.dealer].atot += r.atot;
                
                let ytdW = 0, fullW = 0;
                for(let m=1; m<=12; m++) {
                    fullW += r.mAvg[m];
                    if(m <= selectedMonth) { ytdW += r.mAvg[m]; dMap[r.dealer].aytd += r.mAvg[m]; }
                }
                const ratio = (fullW > 0) ? (ytdW / fullW) : (selectedMonth / 12);
                dMap[r.dealer].ly_ytd += (r.ly_total * ratio);
            });

            let T = { ytd:0, ly_ytd:0, aytd:0, atot:0 };
            Object.values(dMap).forEach(v => { T.ytd += v.ytd; T.ly_ytd += v.ly_ytd; T.aytd += v.aytd; T.atot += v.atot; });

            document.getElementById('ytd-val').innerText = Math.ceil(T.ytd).toLocaleString();
            document.getElementById('ly-ytd-val').innerText = Math.ceil(T.ly_ytd).toLocaleString();
            
            const yoy = T.ly_ytd > 0 ? Math.ceil(((T.ytd / T.ly_ytd) - 1) * 100) : 0;
            const badge = document.getElementById('ytd-yoy-badge');
            badge.innerText = `전년동기비 ${yoy}% ${yoy >= 0 ? '▲' : '▼'}`;
            badge.className = `mt-2 inline-block px-2 py-0.5 rounded-md text-[9px] font-black self-start ${yoy>=0?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'}`;

            document.getElementById('attainment-ytd-pct').innerText = (T.aytd > 0 ? Math.ceil((T.ytd/T.aytd)*100) : 0) + "%";
            document.getElementById('attainment-ytd-bar').style.width = Math.min(100, (T.aytd > 0 ? (T.ytd/T.aytd)*100 : 0)) + "%";
            document.getElementById('target-ytd-val').innerText = Math.ceil(T.aytd).toLocaleString();

            document.getElementById('attainment-total-pct').innerText = (T.atot > 0 ? Math.ceil((T.ytd/T.atot)*100) : 0) + "%";
            document.getElementById('attainment-total-bar').style.width = Math.min(100, (T.atot > 0 ? (T.ytd/T.atot)*100 : 0)) + "%";
            document.getElementById('target-total-val').innerText = Math.ceil(T.atot).toLocaleString();

            const entries = Object.entries(dMap)
                .filter(([n]) => n.toLowerCase().includes(search))
                .sort((a,b) => sortDesc ? b[1][sortCol] - a[1][sortCol] : a[1][sortCol] - b[1][sortCol]);

            document.getElementById('row-count').innerText = entries.length + " DEALERS";

            document.getElementById('dealer-list').innerHTML = entries.map(([n, d]) => {
                const py = d.aytd > 0 ? Math.ceil((d.ytd/d.aytd)*100) : 0;
                const pt = d.atot > 0 ? Math.ceil((d.ytd/d.atot)*100) : 0;
                const yoyDeal = d.ly_ytd > 0 ? Math.ceil(((d.ytd/d.ly_ytd)-1)*100) : 0;
                return `<tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 sticky left-0 bg-white font-bold border-r shadow-[2px_0_5px_rgba(0,0,0,0.02)]">${n}</td>
                    <td class="px-4 py-4 text-right text-slate-400">${Math.ceil(d.ly_ytd).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right bg-red-50/20"><span class="bstk-red font-black">${Math.ceil(d.ytd).toLocaleString()}</span><span class="text-[9px] ml-1 ${yoyDeal>=0?'text-emerald-500':'text-red-500'}">(${yoyDeal>=0?'+':''}${yoyDeal}%)</span></td>
                    <td class="px-4 py-4 text-right text-slate-500">${Math.ceil(d.atot).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right text-slate-500">${Math.ceil(d.aytd).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right"><span class="px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-black">${pt}%</span></td>
                    <td class="px-4 py-4 text-right"><span class="px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 text-[10px] font-black">${py}%</span></td>
                </tr>`;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
