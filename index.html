<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSTK 보안 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
        <div class="bg-red-600 text-white font-black px-4 py-2 rounded-lg inline-block mb-8 italic">BSTK</div>
        <h1 class="text-2xl font-black text-slate-800 mb-2">보안 접속</h1>
        <p class="text-slate-400 text-xs mb-10 font-bold">등록된 성함을 입력해 주세요.</p>
        
        <input id="userName" type="text" placeholder="성함 입력" 
            class="w-full border-2 border-slate-100 rounded-2xl px-4 py-5 mb-6 text-center font-bold text-lg focus:border-red-500 outline-none transition-all">
        
        <button onclick="checkAuth()" id="loginBtn"
            class="w-full bg-slate-800 text-white font-black py-5 rounded-2xl hover:bg-black transition-all shadow-lg text-lg">
            인증 및 접속
        </button>
        
        <p id="msg" class="mt-6 text-[11px] font-bold text-red-500 min-h-[1rem]"></p>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzYl0AmGKE_swUPCMFi1HqnQHgxPD9fdySuageBF4c5UuDtrRxeuw-Bmc5bNSxy5I0/exec";

        async function checkAuth() {
            const name = document.getElementById("userName").value.trim();
            const btn = document.getElementById("loginBtn");
            const msg = document.getElementById("msg");

            if(!name) { alert("성함을 입력하세요."); return; }

            btn.disabled = true;
            btn.innerText = "기기 검증 중...";
            msg.innerText = "";

            // 기기 식별 및 타입 판별
            const deviceId = navigator.userAgent.replace(/\D/g, "") + screen.width + screen.height;
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const deviceModel = isMobile ? "MOBILE" : "PC/Laptop";

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ name, deviceId, deviceModel })
                });
                const result = await response.text();

                if(result === "SUCCESS") {
                    localStorage.setItem("bstk_user", name);
                    location.replace("main.html");
                } else if(result === "DUPLICATE_LOGIN") {
                    msg.innerText = "❌ 이미 다른 기기에서 접속 중입니다.";
                } else if(result === "FAIL_DEVICE") {
                    msg.innerText = "❌ 등록된 기기가 아닙니다. (PC 1대, 모바일 1대만 가능)";
                } else if(result === "NO_USER") {
                    msg.innerText = "❌ 권한이 없습니다. 관리자에게 문의하세요.";
                }
            } catch (e) {
                msg.innerText = "⚠️ 서버 연결 오류";
            } finally {
                btn.disabled = false;
                btn.innerText = "인증 및 접속";
            }
        }
    </script>
</body>
</html>
