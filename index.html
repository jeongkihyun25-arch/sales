<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSTK LT WG 실적 관리 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .bstk-red { color: #E30613; }
        .bg-bstk-red { background-color: #E30613; }
        
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 4px 10px -3px rgba(0, 0, 0, 0.02); transition: transform 0.2s ease, box-shadow 0.2s ease; }
        
        .filter-btn { transition: all 0.2s ease; position: relative; overflow: hidden; white-space: nowrap; }
        .filter-active { background-color: #0f172a; color: white; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }
        .filter-inactive { background-color: white; color: #64748b; border: 1px solid #e2e8f0; }
        
        /* 💡 엑셀식 틀고정 & 모바일 최적화 스타일 */
        .table-container { max-height: 65vh; overflow: auto; position: relative; border-radius: 0.5rem; }
        .sticky-header { position: sticky; top: 0; z-index: 40; background-color: #f8fafc; }
        .sticky-col { position: sticky; left: 0; z-index: 30; background-color: #ffffff; }
        .sticky-corner { position: sticky; top: 0; left: 0; z-index: 50; background-color: #f8fafc; border-right: 2px solid #f1f5f9; }
        
        .tooltip-text { transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100; word-break: keep-all; line-height: 1.4; pointer-events: none; }
        @media (hover: hover) {
            .group-tooltip:hover .tooltip-text { opacity: 1; transform: translateY(0) translateX(-50%); }
        }
        
        th.sortable { cursor: pointer; transition: background-color 0.2s; user-select: none; }
        .loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .detail-row { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden selection:bg-red-100 selection:text-red-900">

    <div id="loader" class="loading-overlay">
        <div class="w-10 h-10 border-4 border-slate-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-slate-500 text-sm mt-3">LT WG 실적을 분석 중입니다...</p>
    </div>

    <header class="sticky top-0 z-50 glass-header">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 md:py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-4">
                <div class="bg-gradient-to-br from-[#E30613] to-[#B0000A] text-white font-black px-2.5 md:px-3.5 py-1 md:py-1.5 rounded-lg text-[11px] md:text-sm italic shadow-md">BSTK</div>
                <div>
                    <h1 class="text-sm md:text-xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 truncate max-w-[140px] md:max-w-none">LT WG 실적 확인</h1>
                    <div id="last-update" class="text-[9px] md:text-[10px] text-slate-400 font-bold flex items-center gap-1 mt-0.5">업데이트 확인 중...</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div id="row-count" class="hidden md:block text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">로딩 중...</div>
                <select id="month-select" onchange="changeMonth()" class="border border-slate-200 rounded-lg px-2 md:px-4 py-1.5 text-[11px] md:text-sm font-bold bg-white shadow-sm"></select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-5 md:py-8">
        
        <div class="bg-white p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] card-shadow border border-white mb-6 md:mb-8 relative overflow-hidden">
            <div class="flex flex-col md:flex-row gap-4 md:gap-8 relative z-10">
                <div class="flex flex-col gap-2">
                    <span class="text-[10px] font-black text-slate-400 tracking-widest bg-slate-50 px-2 py-1 rounded self-start uppercase">Size</span>
                    <div class="flex gap-1.5 overflow-x-auto pb-1 table-scroll">
                        <button onclick="setFilter('size', 'ALL')" id="sz-ALL" class="filter-btn filter-active px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">전체</button>
                        <button onclick="setFilter('size', '205')" id="sz-205" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">205</button>
                        <button onclick="setFilter('size', '215')" id="sz-215" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">215</button>
                        <button onclick="setFilter('size', '225')" id="sz-225" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">225</button>
                    </div>
                </div>
                <div class="hidden md:block w-px h-12 bg-slate-100"></div>
                <div class="flex flex-col gap-2">
                    <span class="text-[10px] font-black text-slate-400 tracking-widest bg-slate-50 px-2 py-1 rounded self-start uppercase">Pattern</span>
                    <div class="flex gap-1.5 overflow-x-auto pb-1 table-scroll">
                        <button onclick="setFilter('pattern', 'ALL')" id="pt-ALL" class="filter-btn filter-active px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">전체</button>
                        <button onclick="setFilter('pattern', 'RS002')" id="pt-RS002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">RS002</button>
                        <button onclick="setFilter('pattern', 'RD002')" id="pt-RD002" class="filter-btn filter-inactive px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0">RD002</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-5 mb-6 md:mb-10">
            <div class="bg-white p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] card-shadow border border-slate-100 flex flex-col justify-between group">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-500 uppercase tracking-wide">올해 누적 (YTD)</p>
                <div class="flex items-baseline gap-1 mt-1">
                    <span id="ytd-val" class="text-2xl md:text-5xl font-black text-slate-800">0</span><span class="text-slate-400 font-bold text-xs md:text-base">본</span>
                </div>
                <div id="ytd-yoy-badge" class="mt-2 inline-block px-2 py-0.5 rounded-md text-[9px] font-black self-start border border-slate-100 shadow-sm">계산중</div>
                <p id="ly-ytd-text" class="text-[9px] text-slate-400 mt-2 font-medium">작년 동기: <span id="ly-ytd-val">0</span>본</p>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] card-shadow border border-slate-100 flex flex-col justify-between">
                <p id="month-label" class="text-[9px] md:text-[11px] font-bold text-slate-500 uppercase tracking-wide">당월 실적</p>
                <div class="flex items-baseline gap-1 mt-1">
                    <span id="month-val" class="text-2xl md:text-5xl font-black bstk-red">0</span><span class="text-red-200 font-bold text-xs md:text-base">본</span>
                </div>
                <div id="yoy-badge" class="mt-2 inline-block px-2 py-0.5 rounded-md text-[9px] font-black self-start border border-slate-100 shadow-sm">계산중</div>
                <p id="ly-month-text" class="text-[9px] text-slate-400 mt-2 font-medium">작년 당월: <span id="ly-month-val">0</span>본</p>
            </div>

            <div class="bg-slate-800 p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] text-white card-shadow flex flex-col justify-between">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-300 uppercase tracking-widest">동기간 도달률</p>
                <div id="attainment-ytd-pct" class="text-3xl md:text-5xl font-black text-emerald-400">0%</div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden mt-2"><div id="attainment-ytd-bar" class="bg-emerald-400 h-full w-0 transition-all duration-1000"></div></div>
                <p class="text-[8px] text-slate-500 mt-2">5년평균 누적(<span id="target-ytd-val">0</span>) 대비</p>
            </div>

            <div class="bg-slate-900 p-4 md:p-6 rounded-[1.2rem] md:rounded-[2rem] text-white card-shadow flex flex-col justify-between border-t-2 border-indigo-500">
                <p class="text-[9px] md:text-[11px] font-bold text-slate-300 uppercase tracking-widest">연간 총 달성률</p>
                <div id="attainment-total-pct" class="text-3xl md:text-5xl font-black text-indigo-400">0%</div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden mt-2"><div id="attainment-total-bar" class="bg-indigo-400 h-full w-0 transition-all duration-1000"></div></div>
                <p class="text-[8px] text-slate-500 mt-2">5년평균 연간(<span id="target-total-val">0</span>) 대비</p>
            </div>
        </div>

        <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] card-shadow border border-slate-100 overflow-hidden flex flex-col h-full">
            <div class="px-4 md:px-8 py-4 md:py-6 border-b border-slate-100 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 text-left">
                <div class="flex items-center gap-2">
                    <h3 class="font-black text-slate-800 text-sm md:text-lg">대리점별 상세 판매추이</h3>
                    <span class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[9px] font-bold uppercase border border-slate-200">틀고정 완료</span>
                </div>
                <div class="relative w-full lg:w-80">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input id="search-input" type="text" placeholder="대리점명 또는 초성 (신화, ㅅㅎ)" autocomplete="off"
                        class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2 md:py-2.5 text-sm font-bold text-slate-700 bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all shadow-inner">
                    <div id="autocomplete-list" class="absolute z-50 w-full bg-white mt-2 rounded-xl shadow-xl border border-slate-100 max-h-60 overflow-y-auto hidden divide-y divide-slate-50"></div>
                </div>
            </div>
            
            <div class="table-container">
                <table class="w-full text-left whitespace-nowrap min-w-[700px] md:min-w-[1100px]">
                    <thead class="sticky-header">
                        <tr class="bg-slate-50/80 text-[9px] md:text-[10px] font-black text-slate-500 uppercase border-b border-slate-200">
                            <th class="px-3 md:px-10 py-3 md:py-4 sticky-corner border-r border-slate-100 shadow-sm">딜러명 (상세)</th>
                            <th class="sortable px-4 py-4 text-right group-tooltip relative" onclick="setSort('ly')">전년 동월 <span id="sort-icon-ly"></span></th>
                            <th class="sortable px-4 py-4 text-right group-tooltip relative" onclick="setSort('cm')">당월 판매 <span id="sort-icon-cm"></span></th>
                            <th class="sortable px-4 py-4 text-right group-tooltip relative" onclick="setSort('yoy')">전년비 <span id="sort-icon-yoy"></span></th>
                            <th class="sortable px-4 py-4 text-right bg-red-50/30 text-red-900 border-l group-tooltip relative" onclick="setSort('ytd')">올해 누계(YTD) <span id="sort-icon-ytd">▼</span></th>
                            <th class="sortable px-4 py-4 text-right hover:bg-slate-100 transition-colors" onclick="setSort('pt')">연간 달성률 <span id="sort-icon-pt"></span></th>
                            <th class="sortable px-4 py-4 text-right hover:bg-slate-100 transition-colors" onclick="setSort('py')">동기간 도달률 <span id="sort-icon-py"></span></th>
                        </tr>
                    </thead>
                    <tbody id="dealer-list" class="divide-y divide-slate-100 text-[11px] md:text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USER = "jeongkihyun25-arch";
        const REPO_NAME = "Dashboard";
        const t = new Date().getTime();
        
        let rawCurrent = [], rawLastYear = [], rawHistory = [], uniqueDealers = [];
        let filterSize = 'ALL', filterPattern = 'ALL', selectedMonth = 1, maxAvailableMonth = 1;
        let sortCol = 'ytd', sortDesc = true; 

        const CHOSUNG = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
        function getChosung(str) {
            if (!str) return "";
            let res = "";
            for(let i=0; i<str.length; i++) {
                let code = str.charCodeAt(i) - 44032;
                if(code > -1 && code < 11172) res += CHOSUNG[Math.floor(code / 588)];
                else res += str.charAt(i);
            }
            return res;
        }

        const isStrictTarget = (row, header) => {
            const mtpIdx = header.findIndex(v => String(v || '').toUpperCase().includes('MTP분류'));
            const deptIdx = header.findIndex(v => String(v || '').includes('이익부서'));
            const sizeIdx = header.findIndex(v => String(v || '').toUpperCase().includes('SIZE') || String(v || '').includes('사이즈'));
            if (mtpIdx === -1 || sizeIdx === -1) return false;
            const mtp = String(row[mtpIdx] || '').trim().toUpperCase();
            const size = String(row[sizeIdx] || '').trim();
            const dept = deptIdx !== -1 ? String(row[deptIdx] || '').trim() : '';
            if (size.includes('235')) return false; 
            if (dept.includes('경영계획')) return false; 
            return mtp === 'LSR2' || (mtp.includes('17.5') && (mtp.includes('DOWN') || mtp.includes('T/L') || mtp.includes('TBR')));
        };

        const matchFilterSize = (s, fs) => fs === 'ALL' || String(s).includes(fs);
        const matchPattern = (p, fp) => {
            if(fp === 'ALL') return true;
            const up = String(p).toUpperCase();
            return fp === 'RS002' ? (up.includes('RS002') || up.includes('STEER')) : (up.includes('RD002') || up.includes('DRIVE'));
        };

        async function fetchRaw(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) return []; 
                const ab = await res.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(ab), {type: 'array'});
                return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
            } catch (e) { return []; }
        }

        async function init() {
            try {
                const [cRows, lyRows, hRows] = await Promise.all([
                    fetchRaw(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/current_sales.xlsx?t=${t}`), 
                    fetchRaw(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/last_year_sales.xls?t=${t}`), 
                    fetchRaw(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/historical_data.xlsx?t=${t}`)
                ]);
                
                const cData = processCurrent(cRows, 2026);
                const lyData = processCurrent(lyRows, 2025);
                rawCurrent = cData.data;
                rawLastYear = lyData.data;
                rawHistory = processHistory(hRows); 

                selectedMonth = cData.maxMonth > 0 ? cData.maxMonth : (new Date().getMonth() + 1);
                maxAvailableMonth = cData.maxMonth > 0 ? cData.maxMonth : 12;

                const dealerSet = new Set();
                [...rawCurrent, ...rawLastYear, ...rawHistory].forEach(r => { if (r && r.d) dealerSet.add(r.d); });
                uniqueDealers = Array.from(dealerSet).map(name => ({ name: name, chosung: getChosung(name) }));

                initMonthSelector();
                setupSearch();
                render();
                
                document.getElementById('loader').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        function processCurrent(rows, targetYear) {
            if (!rows || rows.length < 2) return { data: [], maxMonth: 1 };
            let cHeadIdx = 0;
            for(let i=0; i<Math.min(10, rows.length); i++) {
                const rowStr = rows[i].map(v=>String(v||'')).join('');
                if(rowStr.includes('거래처') && (rowStr.toUpperCase().includes('SIZE') || rowStr.includes('사이즈'))) {
                    cHeadIdx = i; break;
                }
            }
            const h = rows[cHeadIdx].map(v => String(v || '').trim());
            const idxD = h.findIndex(v => v.includes('거래처') || v.includes('딜러'));
            const idxS = h.findIndex(v => v.toUpperCase().includes('SIZE') || v.includes('사이즈'));
            const idxP = h.findIndex(v => v.toUpperCase().includes('PTTN') || v.includes('패턴'));
            const monthlyIdx = {}; let maxMonth = 1;
            for(let i=0; i<h.length; i++) {
                if (String(h[i]).toUpperCase().replace(/\s/g, '').includes('QTY')) {
                    const prevCol = String(h[i-1] || '');
                    const match = prevCol.match(new RegExp(`${targetYear}-(\\d{2})`)) || prevCol.match(/-(\d{2})/);
                    let m = match ? parseInt(match[1], 10) : i; // 달 못찾으면 인덱스로
                    if(m > 0 && m <= 12) { monthlyIdx[m] = i; if(m > maxMonth) maxMonth = m; }
                }
            }
            const dataMap = new Map();
            const cleanStr = str => String(str || '').replace(/[\s\/\(\)주]/g, '').toUpperCase();
            for (let i = cHeadIdx + 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || !String(r[idxD]||'').trim() || r[idxD].includes('합계')) continue;
                if (!isStrictTarget(r, h)) continue;
                const key = cleanStr(r[idxD]) + '|' + cleanStr(r[idxS]) + '|' + cleanStr(r[idxP]);
                const monthly = {};
                for(let m=1; m<=12; m++) {
                    const val = monthlyIdx[m] ? parseFloat(String(r[monthlyIdx[m]]||'0').replace(/,/g, '')) : 0;
                    monthly[m] = isNaN(val) ? 0 : val;
                }
                if(!dataMap.has(key)) dataMap.set(key, { d: String(r[idxD]).replace(/\(주\)/g,'').trim(), s: String(r[idxS]||'').trim(), p: String(r[idxP]||'').trim(), monthly });
                else { for(let m=1; m<=12; m++) dataMap.get(key).monthly[m] += monthly[m]; }
            }
            return { data: Array.from(dataMap.values()), maxMonth };
        }

        function processHistory(rows) {
            if (!rows || rows.length < 2) return [];
            let hHeadIdx = 0;
            for(let i=0; i<Math.min(10, rows.length); i++) {
                const rowStr = rows[i].map(v=>String(v||'')).join('');
                if(rowStr.includes('거래처명') && rowStr.includes('사이즈')) { hHeadIdx = i; break; }
            }
            const h = rows[hHeadIdx].map(v => String(v || '').trim());
            const idxD = h.findIndex(v => v.includes('거래처명')); 
            const idxS = h.findIndex(v => v.includes('사이즈') || v.toUpperCase().includes('SIZE'));
            const idxP = h.findIndex(v => v.toUpperCase().includes('PTTN') || v.includes('패턴명'));
            const monthIdx = {}; for(let m=1; m<=12; m++) monthIdx[m] = h.findIndex(v => String(v).replace(/\s/g, '') === `${m}월(5년평균)`);
            const idxAvgYear = h.findIndex(v => String(v).replace(/\s/g, '').includes('5년평균'));
            const cleanStr = str => String(str || '').replace(/[\s\/\(\)주]/g, '').toUpperCase();
            const res = [];
            for (let i = hHeadIdx + 1; i < rows.length; i++) {
                const r = rows[i]; if (!r || !r[idxD]) continue;
                if (String(r[idxS]).includes('235') || !String(r[idxS]).includes('17.5')) continue; 
                const annualAvg = parseFloat(String(r[idxAvgYear]||0).replace(/,/g,'')) || 0;
                const monthlyAvg = {};
                for(let m=1; m<=12; m++) monthlyAvg[m] = monthIdx[m] !== -1 ? (parseFloat(String(r[monthIdx[m]]||0).replace(/,/g,'')) || 0) : annualAvg/12;
                res.push({ key: cleanStr(r[idxD])+'|'+cleanStr(r[idxS])+'|'+cleanStr(r[idxP]), d: String(r[idxD]).replace(/\(주\)/g,'').trim(), s: String(r[idxS]), p: String(r[idxP]), monthlyAvg, annualAvg });
            }
            return res;
        }

        function initMonthSelector() {
            const sel = document.getElementById('month-select');
            sel.innerHTML = '';
            for (let m = 1; m <= maxAvailableMonth; m++) {
                const opt = document.createElement('option');
                opt.value = m; opt.textContent = `${m}월 마감 기준`;
                if (m === selectedMonth) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        window.changeMonth = () => { selectedMonth = parseInt(document.getElementById('month-select').value); render(); };
        window.setFilter = (t, v) => {
            if(t === 'size') filterSize = v; else filterPattern = v;
            ['sz-ALL','sz-205','sz-215','sz-225','pt-ALL','pt-RS002','pt-RD002'].forEach(id => {
                const btn = document.getElementById(id);
                if(btn) btn.className = id.includes(v) ? 'filter-btn filter-active px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0' : 'filter-btn filter-inactive px-4 py-2 rounded-xl text-[11px] font-bold flex-shrink-0';
            });
            render();
        }
        window.setSort = (col) => { if (sortCol === col) sortDesc = !sortDesc; else { sortCol = col; sortDesc = true; } render(); }

        function setupSearch() {
            const input = document.getElementById('search-input'), list = document.getElementById('autocomplete-list');
            input.addEventListener('input', function() {
                const val = this.value.trim().toLowerCase().replace(/\s+/g, ''), choVal = getChosung(val);
                list.innerHTML = ''; if (!val) { list.classList.add('hidden'); filterTable(''); return; }
                const matches = uniqueDealers.filter(d => {
                    const nMatch = d.name.toLowerCase().includes(val), cMatch = d.chosung.includes(choVal);
                    d._score = nMatch ? 2 : (cMatch ? 1 : 0); return d._score > 0;
                }).sort((a,b) => b._score - a._score);
                if (matches.length > 0) {
                    matches.slice(0, 10).forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'px-4 py-2.5 cursor-pointer hover:bg-slate-50 hover:text-red-600 text-[11px] md:text-sm font-bold';
                        div.innerHTML = m.name;
                        div.onclick = () => { input.value = m.name; list.classList.add('hidden'); filterTable(m.name); };
                        list.appendChild(div);
                    });
                    list.classList.remove('hidden');
                } else list.classList.add('hidden');
                filterTable(val, choVal);
            });
            document.onclick = (e) => { if (e.target !== input) list.classList.add('hidden'); };
        }

        function filterTable(t, c = '') {
            document.querySelectorAll('#dealer-list tr.dealer-row').forEach(tr => {
                const n = tr.getAttribute('data-name').toLowerCase(), cho = tr.getAttribute('data-cho');
                tr.style.display = (n.includes(t) || (c && cho.includes(c))) ? '' : 'none';
            });
        }

        const getYoY = (c, p) => {
            if (p === 0) return c > 0 ? `<span class="text-blue-500 font-black bg-blue-50 px-1.5 py-0.5 rounded text-[10px]">신규</span>` : `<span class="text-slate-300">-</span>`;
            const pct = Math.ceil(((c / p) - 1) * 100);
            return pct > 0 ? `<span class="text-emerald-500 font-black">+${pct}% ▲</span>` : (pct < 0 ? `<span class="text-red-500 font-black">${pct}% ▼</span>` : `<span class="text-slate-400 font-bold bg-slate-50 px-1.5 py-0.5 rounded text-[10px]">동일</span>`);
        };

        function render() {
            const cur = rawCurrent.filter(r => matchFilterSize(r.s, filterSize) && matchPattern(r.p, filterPattern));
            const ly = rawLastYear.filter(r => matchFilterSize(r.s, filterSize) && matchPattern(r.p, filterPattern));
            const his = rawHistory.filter(r => matchFilterSize(r.s, filterSize) && matchPattern(r.p, filterPattern));
            
            const dMap = new Map();
            cur.forEach(r => {
                let ytd = 0; for(let m=1; m<=selectedMonth; m++) ytd += r.monthly[m];
                const mth = r.monthly[selectedMonth];
                if(!dMap.has(r.d)) dMap.set(r.d, { y:0, m:0, y_ly:0, m_ly:0, a_y:0, a_t:0, details:[] });
                const d = dMap.get(r.d); d.y += ytd; d.m += mth; d.details.push({...r, ytd, mth});
            });
            ly.forEach(r => {
                let ytdLY = 0; for(let m=1; m<=selectedMonth; m++) ytdLY += r.monthly[m];
                const mthLY = r.monthly[selectedMonth];
                if(!dMap.has(r.d)) dMap.set(r.d, { y:0, m:0, y_ly:0, m_ly:0, a_y:0, a_t:0, details:[] });
                const d = dMap.get(r.d); d.y_ly += ytdLY; d.m_ly += mthLY;
            });
            his.forEach(r => {
                let aytd = 0; for(let m=1; m<=selectedMonth; m++) aytd += r.monthlyAvg[m];
                if(!dMap.has(r.d)) dMap.set(r.d, { y:0, m:0, y_ly:0, m_ly:0, a_y:0, a_t:0, details:[] });
                const d = dMap.get(r.d); d.a_y += aytd; d.a_t += r.annualAvg;
            });

            let sumY=0, sumM=0, sumYLY=0, sumMLY=0, sumAY=0, sumAT=0;
            dMap.forEach(v => { sumY+=v.y; sumM+=v.m; sumYLY+=v.y_ly; sumMLY+=v.m_ly; sumAY+=v.a_y; sumAT+=v.a_t; });

            document.getElementById('ytd-val').innerText = Math.ceil(sumY).toLocaleString();
            document.getElementById('month-val').innerText = Math.ceil(sumM).toLocaleString();
            document.getElementById('ly-ytd-val').innerText = Math.ceil(sumYLY).toLocaleString();
            document.getElementById('ly-month-val').innerText = Math.ceil(sumMLY).toLocaleString();
            document.getElementById('target-ytd-val').innerText = Math.ceil(sumAY).toLocaleString();
            document.getElementById('target-total-val').innerText = Math.ceil(sumAT).toLocaleString();

            const yoyY = sumYLY>0?Math.ceil(((sumY/sumYLY)-1)*100):0, yoyM = sumMLY>0?Math.ceil(((sumM/sumMLY)-1)*100):0;
            document.getElementById('ytd-yoy-badge').innerText = `전년동기 ${yoyY}% ${yoyY>=0?'▲':'▼'}`;
            document.getElementById('ytd-yoy-badge').className = `mt-2 inline-block px-2 py-0.5 rounded-md text-[9px] font-black self-start ${yoyY>=0?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'}`;
            document.getElementById('yoy-badge').innerText = `전년비 ${yoyM}% ${yoyM>=0?'▲':'▼'}`;
            document.getElementById('yoy-badge').className = `mt-2 inline-block px-2 py-0.5 rounded-md text-[9px] font-black self-start ${yoyM>=0?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'}`;

            const py = sumAY>0?Math.ceil((sumY/sumAY)*100):0, pt = sumAT>0?Math.ceil((sumY/sumAT)*100):0;
            document.getElementById('attainment-ytd-pct').innerText = py+'%';
            document.getElementById('attainment-ytd-bar').style.width = Math.min(py,100)+'%';
            document.getElementById('attainment-total-pct').innerText = pt+'%';
            document.getElementById('attainment-total-bar').style.width = Math.min(pt,100)+'%';

            const entries = Array.from(dMap.entries()).sort((a,b) => {
                const vA = a[1], vB = b[1];
                if(sortCol==='ly') return sortDesc ? vB.m_ly - vA.m_ly : vA.m_ly - vB.m_ly;
                if(sortCol==='cm') return sortDesc ? vB.m - vA.m : vA.m - vB.m;
                if(sortCol==='atot') return sortDesc ? vB.a_t - vA.a_t : vA.a_t - vB.a_t;
                if(sortCol==='pt') return sortDesc ? (vB.a_t?vB.y/vB.a_t:0) - (vA.a_t?vA.y/vA.a_t:0) : (vA.a_t?vA.y/vA.a_t:0) - (vB.a_t?vB.y/vB.a_t:0);
                if(sortCol==='py') return sortDesc ? (vB.a_y?vB.y/vB.a_y:0) - (vA.a_y?vA.y/vA.a_y:0) : (vA.a_y?vA.y/vA.a_y:0) - (vB.a_y?vB.y/vB.a_y:0);
                return sortDesc ? vB.y - vA.y : vA.y - vB.y;
            });

            document.getElementById('row-count').innerText = `${entries.length} Dealers`;
            document.getElementById('dealer-list').innerHTML = entries.map(([n, v], idx) => {
                const pt = v.a_t?Math.ceil((v.y/v.a_t)*100):0, py = v.a_y?Math.ceil((v.y/v.a_y)*100):0;
                return `
                <tr class="dealer-row transition-colors group" data-name="${n}" data-cho="${getChosung(n)}" onclick="const el=document.getElementById('detail-${idx}'); el.classList.toggle('hidden')">
                    <td class="px-3 md:px-10 py-3 md:py-4 sticky-col font-bold border-r border-slate-100 shadow-sm">
                        <div class="flex items-center justify-between"><span>${n}</span><span class="text-[8px] text-slate-300">▼</span></div>
                    </td>
                    <td class="px-4 py-4 text-right text-slate-400">${Math.ceil(v.m_ly).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right text-slate-700">${Math.ceil(v.m).toLocaleString()}</td>
                    <td class="px-4 py-4 text-right">${getYoY(v.m, v.m_ly)}</td>
                    <td class="px-4 py-4 text-right bg-red-50/20 border-l">
                        <span class="bstk-red font-black">${Math.ceil(v.y).toLocaleString()}</span>
                        <span class="text-[10px] ml-1 text-slate-400">(${v.y_ly?Math.ceil((v.y/v.y_ly-1)*100):0}%)</span>
                    </td>
                    <td class="px-4 py-4 text-right">
                        <div class="flex flex-col items-end"><span class="px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-black">${pt}%</span>
                        <span class="text-[9px] text-slate-400">(${Math.ceil(v.y)}/${Math.ceil(v.a_t)})</span></div>
                    </td>
                    <td class="px-4 py-4 text-right">
                        <div class="flex flex-col items-end"><span class="px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 text-[10px] font-black">${py}%</span>
                        <span class="text-[9px] text-slate-400">(${Math.ceil(v.y)}/${Math.ceil(v.a_y)})</span></div>
                    </td>
                </tr>
                <tr id="detail-${idx}" class="hidden bg-slate-50 detail-row"><td colspan="7" class="p-3">
                    <div class="bg-white p-3 rounded-xl border border-slate-200">
                        <table class="w-full text-[10px]"><thead><tr class="text-slate-400 border-b border-slate-100"><th class="pb-1">규격/패턴</th><th class="text-right pb-1">당월</th><th class="text-right pb-1">누적</th></tr></thead>
                        <tbody>${v.details.sort((a,b)=>b.ytd-a.ytd).map(d=>`<tr><td class="py-1"><b>${d.s}</b> ${d.p}</td><td class="text-right">${Math.ceil(d.mth)}</td><td class="text-right bstk-red font-bold">${Math.ceil(d.ytd)}</td></tr>`).join('')}</tbody></table>
                    </div>
                </td></tr>`;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
